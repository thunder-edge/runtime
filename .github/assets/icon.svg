<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- Background gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a4747"/>
      <stop offset="100%" stop-color="#2b2a2a"/>
    </linearGradient>

    <!-- Bolt gradient -->
    <linearGradient id="boltGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF07A"/>
      <stop offset="50%" stop-color="#FFD84D"/>
      <stop offset="100%" stop-color="#F2A81D"/>
    </linearGradient>

    <!-- Bolt highlight -->
    <linearGradient id="boltHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="url(#bgGradient)"/>

  <!-- Bolt -->
  <g transform="translate(55,28) scale(1.2)" filter="url(#shadow)">
    <path
      d="M70 0 L10 95 L60 95 L30 160 L110 65 L60 65 Z"
      fill="url(#boltGradient)"
    />
    <path
      d="M70 0 L10 95 L60 95 L30 160 L110 65 L60 65 Z"
      fill="url(#boltHighlight)"
    />
  </g>

</svg>